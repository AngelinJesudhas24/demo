<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Marry Me? ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Arial',sans-serif;
}

body{
overflow:hidden;
height:100vh;
background:linear-gradient(135deg,#ff0f5b,#ff5f9e);
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* INTRO SCREEN */

#intro{
position:fixed;
inset:0;
background:linear-gradient(135deg,#ff0f5b,#ff7eb3);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
z-index:999;
}

.ring{
font-size:120px;
animation:ring 1.5s infinite;
}

@keyframes ring{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-25px);}
}

#intro h2{
margin-top:20px;
font-size:32px;
}

/* MAIN */

.container{
text-align:center;
color:white;
z-index:2;
}

h1{
font-size:4rem;
text-shadow:0 0 20px white;
margin-bottom:20px;
}

.subtitle{
font-size:1.4rem;
margin-bottom:40px;
}

/* LOVE LETTER */

.letter{
position:absolute;
right:30px;
top:100px;
width:300px;
background:#fff8dc;
padding:20px;
border-radius:15px;
color:#333;
box-shadow:0 0 20px rgba(0,0,0,.3);
z-index:3;
}

.letter h3{
margin-bottom:10px;
}

/* BUTTONS */

.buttons{
position:relative;
width:500px;
height:250px;
margin:auto;
}

button{
border:none;
cursor:pointer;
border-radius:50px;
font-size:24px;
transition:.3s;
}

#yesBtn{
padding:15px 40px;
background:#2ecc71;
color:white;
box-shadow:0 0 20px #2ecc71;
}

#noBtn{
position:absolute;
left:300px;
top:0;
padding:15px 40px;
background:#ff1744;
color:white;
box-shadow:0 0 20px #ff1744;
}

/* HEARTS */

.heart{
position:fixed;
bottom:-50px;
animation:floatHeart linear forwards;
z-index:1;
}

@keyframes floatHeart{
from{
transform:translateY(0);
opacity:1;
}
to{
transform:translateY(-110vh);
opacity:0;
}
}

/* SUCCESS SCREEN */

.success{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff0f5b,#ff7eb3);
color:white;
z-index:9999;
}

.success h1{
font-size:5rem;
margin-bottom:20px;
}

.success p{
font-size:2rem;
}

/* CONFETTI */

.confetti{
position:fixed;
width:10px;
height:10px;
background:white;
top:-10px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}
}

</style>
</head>

<body>

<!-- INTRO -->

<div id="intro">
<div class="ring">💍</div>
<h2>Something Special For You...</h2>
</div>

<!-- MAIN CONTENT -->

<div class="container">

<h1>Will You Marry Me? ❤️</h1>

<p class="subtitle">
You make my world brighter every day ✨
</p>

<div class="buttons">
<button id="yesBtn">Yes ❤️</button>
<button id="noBtn">No 😭</button>
</div>

</div>

<!-- LETTER -->

<div class="letter">
<h3>💌 My Love</h3>

<p>
From the moment you entered my life,
everything became more beautiful.
You are my today, tomorrow and forever.

<br><br>

Will you make me the happiest person alive? ❤️
</p>
</div>

<script>

/* INTRO */

setTimeout(()=>{
document.getElementById("intro").style.display="none";
},3000);

/* FLOATING HEARTS */

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*30)+"px";
heart.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},10000);

}

setInterval(createHeart,250);

/* RUNNING NO BUTTON */

const noBtn=document.getElementById("noBtn");
const yesBtn=document.getElementById("yesBtn");

let yesSize=24;

function moveButton(){

const x=Math.random()*(window.innerWidth-180);
const y=Math.random()*(window.innerHeight-100);

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

yesSize+=5;

yesBtn.style.fontSize=yesSize+"px";

}

noBtn.addEventListener("mouseover",moveButton);
noBtn.addEventListener("click",moveButton);

/* YES CLICK */

yesBtn.addEventListener("click",()=>{

document.body.innerHTML=`

<div class="success">

<h1>YAYYYY! 🎉💍❤️</h1>

<p>
You just made me the happiest person alive! ❤️
</p>

</div>

`;

startConfetti();

});

/* CONFETTI */

function startConfetti(){

for(let i=0;i<300;i++){

const confetti=document.createElement("div");

confetti.className="confetti";

confetti.style.left=Math.random()*100+"vw";

confetti.style.background=
"hsl("+Math.random()*360+",100%,50%)";

confetti.style.animationDuration=
(2+Math.random()*3)+"s";

document.body.appendChild(confetti);

}

}

</script>

</body>
</html>
