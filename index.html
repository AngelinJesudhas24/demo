<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Marry Me? ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(rgba(0,0,0,0.2),rgba(0,0,0,0.2)),
    url('girl-proposing-bg.jpeg');
    background-size:contain;   /* fit background image */
    background-position:center;
    background-repeat:no-repeat;
}

/* INTRO */
#intro{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#ff4f8b,#ff8fb1);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    z-index:9999;
    overflow:hidden;
    cursor:pointer; /* make intro clickable */
}

.gift{
    font-size:120px;
    animation:bounceGift 1.5s infinite;
}

@keyframes bounceGift{
    50%{
        transform:translateY(-20px) rotate(10deg);
    }
}

/* HEARTS */
.heart{
    position:fixed;
    bottom:-50px;
    animation:floatHeart linear forwards;
    z-index:1;
}

@keyframes floatHeart{
    from{transform:translateY(0);opacity:1;}
    to{transform:translateY(-110vh);opacity:0;}
}

/* CARD */
.card{
    width:min(90%,700px);
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    border-radius:30px;
    padding:40px;
    text-align:center;
    color:white;
    box-shadow:0 10px 40px rgba(0,0,0,.3);
    z-index:2;
}

.card h1{
    font-size:4rem;
    margin-bottom:15px;
    text-shadow:0 0 20px white;
}

.card p{
    font-size:1.3rem;
    margin-bottom:30px;
}

/* BUTTONS */
.buttons{position:relative;height:180px;}
button{
    border:none;border-radius:50px;cursor:pointer;transition:.3s;
}
#yesBtn{
    padding:15px 40px;font-size:24px;
    background:#2ecc71;color:white;
    box-shadow:0 0 20px #2ecc71;
}
#noBtn{
    position:absolute;left:260px;top:0;
    padding:15px 40px;font-size:24px;
    background:#ff1744;color:white;
    box-shadow:0 0 20px #ff1744;
}

/* LETTER */
#letterBtn{
    background:#ffffff;color:#ff4f8b;
    padding:12px 24px;margin-bottom:25px;
}
.popup{
    display:none;position:fixed;inset:0;
    background:rgba(0,0,0,.5);
    justify-content:center;align-items:center;
    z-index:999;
}
.popup-content{
    width:min(90%,450px);
    background:#fff7f7;color:#444;
    padding:30px;border-radius:20px;text-align:center;
}
.popup-content h2{color:#ff4f8b;margin-bottom:15px;}
.close{margin-top:20px;padding:10px 20px;}

/* SUCCESS */
.success{
    position:fixed;inset:0;
    background:url('success-bg.png') center/contain no-repeat; /* fit success background */
    display:flex;flex-direction:column;
    justify-content:center;align-items:center;
    color:lavender; /* changed to lavender */
    z-index:9999;overflow:hidden;
}
.success h1{font-size:5rem;}
.success p{font-size:2rem;}

/* CONFETTI */
.confetti{
    position:fixed;width:12px;height:12px;top:-20px;
}
@keyframes fall{
    to{transform:translateY(110vh) rotate(720deg);opacity:0;}
}

@media(max-width:600px){
    .card h1{font-size:2.5rem;}
    #noBtn{left:180px;}
}
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
    <div class="gift">🎁</div>
    <h2>Surprise For You...</h2>
</div>

<!-- MAIN CARD -->
<div class="card">
    <h1>Will You Marry Me? ❤️</h1>
    <p>Every moment with you feels magical. Will you be mine
