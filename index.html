<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Marry Me? ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        rgba(0,0,0,0.2),
        rgba(0,0,0,0.2)
    ),
    url('girl-proposing-bg.png');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

/* INTRO */

#intro{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#ff4f8b,#ff8fb1);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    z-index:9999;
}

.ring{
    font-size:120px;
    animation:ring 1.5s infinite;
}

@keyframes ring{
    50%{
        transform:translateY(-20px) rotate(15deg);
    }
}

/* HEARTS */

.heart{
    position:fixed;
    bottom:-50px;
    animation:floatHeart linear forwards;
    z-index:1;
}

@keyframes floatHeart{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-110vh);
        opacity:0;
    }
}

/* CARD */

.card{
    width:min(90%,700px);

    background:rgba(255,255,255,0.15);

    backdrop-filter:blur(12px);

    border-radius:30px;

    padding:40px;

    text-align:center;

    color:white;

    box-shadow:0 10px 40px rgba(0,0,0,.3);

    z-index:2;
}

.card h1{
    font-size:4rem;
    margin-bottom:15px;
    text-shadow:0 0 20px white;
}

.card p{
    font-size:1.3rem;
    margin-bottom:30px;
}

/* BUTTONS */

.buttons{
    position:relative;
    height:180px;
}

button{
    border:none;
    border-radius:50px;
    cursor:pointer;
    transition:.3s;
}

#yesBtn{
    padding:15px 40px;
    font-size:24px;
    background:#2ecc71;
    color:white;
    box-shadow:0 0 20px #2ecc71;
}

#noBtn{
    position:absolute;
    left:260px;
    top:0;

    padding:15px 40px;
    font-size:24px;

    background:#ff1744;
    color:white;

    box-shadow:0 0 20px #ff1744;
}

/* LETTER */

#letterBtn{
    background:#ffffff;
    color:#ff4f8b;
    padding:12px 24px;
    margin-bottom:25px;
}

.popup{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);

    justify-content:center;
    align-items:center;

    z-index:999;
}

.popup-content{
    width:min(90%,450px);

    background:#fff7f7;

    color:#444;

    padding:30px;

    border-radius:20px;

    text-align:center;
}

.popup-content h2{
    color:#ff4f8b;
    margin-bottom:15px;
}

.close{
    margin-top:20px;
    padding:10px 20px;
}

/* SUCCESS */

.success{
    position:fixed;
    inset:0;

    background:
    linear-gradient(135deg,#ff4f8b,#ff9fc8);

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;

    color:white;

    z-index:9999;
}

.success h1{
    font-size:5rem;
}

.success p{
    font-size:2rem;
}

/* CONFETTI */

.confetti{
    position:fixed;
    width:12px;
    height:12px;
    top:-20px;
}

@keyframes fall{
    to{
        transform:
        translateY(110vh)
        rotate(720deg);

        opacity:0;
    }
}

@media(max-width:600px){

.card h1{
    font-size:2.5rem;
}

#noBtn{
    left:180px;
}

}
</style>
</head>

<body>

<!-- INTRO -->

<div id="intro">
    <div class="ring">💍</div>
    <h2>Something Special For You...</h2>
</div>

<!-- MAIN CARD -->

<div class="card">

    <h1>Will You Marry Me? ❤️</h1>

    <p>
        Every moment with you feels magical.
        Will you be mine forever? 💕
    </p>

    <button id="letterBtn">
        💌 Read My Letter
    </button>

    <div class="buttons">

        <button id="yesBtn">
            Yes ❤️
        </button>

        <button id="noBtn">
            No 😭
        </button>

    </div>

</div>

<!-- LETTER POPUP -->

<div class="popup" id="popup">

    <div class="popup-content">

        <h2>💌 My Love</h2>

        <p>

            From the day you came into my life,
            everything became brighter.

            <br><br>

            You are my happiness,
            my peace,
            and my forever.

            <br><br>

            Will you make me the happiest
            girl in the world? ❤️

        </p>

        <button class="close" onclick="closeLetter()">
            Close
        </button>

    </div>

</div>

<script>

/* INTRO */

setTimeout(()=>{

    document.getElementById("intro")
    .style.display="none";

},3000);

/* HEARTS */

function createHeart(){

    const heart=
    document.createElement("div");

    heart.className="heart";

    heart.innerHTML="❤️";

    heart.style.left=
    Math.random()*100+"vw";

    heart.style.fontSize=
    (20+Math.random()*30)+"px";

    heart.style.animationDuration=
    (5+Math.random()*5)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },10000);
}

setInterval(createHeart,250);

/* LETTER */

const popup=
document.getElementById("popup");

document
.getElementById("letterBtn")
.onclick=()=>{

    popup.style.display="flex";

};

function closeLetter(){

    popup.style.display="none";

}

/* NO BUTTON */

const noBtn=
document.getElementById("noBtn");

const yesBtn=
document.getElementById("yesBtn");

let size=24;

function moveNo(){

    noBtn.style.left=
    Math.random()*
    (window.innerWidth-150)+"px";

    noBtn.style.top=
    Math.random()*
    (window.innerHeight-100)+"px";

    size+=4;

    yesBtn.style.fontSize=
    size+"px";
}

noBtn.addEventListener(
"mouseover",
moveNo
);

noBtn.addEventListener(
"click",
moveNo
);

/* YES BUTTON */

yesBtn.addEventListener(
"click",
()=>{

document.body.innerHTML=`

<div class="success">

<h1>YAYYY! 💍❤️🎉</h1>

<p>
You just made me
the happiest girl alive!
</p>

</div>

`;

confetti();

});

/* CONFETTI */

function confetti(){

for(let i=0;i<300;i++){

const c=
document.createElement("div");

c.className="confetti";

c.style.left=
Math.random()*100+"vw";

c.style.background=
"hsl("+
Math.random()*360+
",100%,50%)";

c.style.animation=
"fall "+
(2+Math.random()*3)+
"s linear";

document.body.appendChild(c);

}

}

</script>

</body>
</html>
